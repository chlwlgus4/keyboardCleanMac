name: KeyboardClean
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    PRODUCT_NAME: KeyboardClean
    PRODUCT_BUNDLE_IDENTIFIER: com.jihyunchoi.keyboardclean
    DEVELOPMENT_TEAM: 37A43S5GYQ
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    SWIFT_VERSION: "5.0"
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Sandbox.entitlements
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    ENABLE_HARDENED_RUNTIME: YES
targets:
  KeyboardClean:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    postBuildScripts:
      - name: Copy Asset Catalog Outputs
        script: |
          set -euo pipefail
          ASSET_OUTPUT_DIR="${TARGET_TEMP_DIR}/assetcatalog_output/thinned"
          RESOURCE_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"

          mkdir -p "$RESOURCE_DIR"

          if [[ -f "${ASSET_OUTPUT_DIR}/Assets.car" ]]; then
            cp "${ASSET_OUTPUT_DIR}/Assets.car" "${RESOURCE_DIR}/Assets.car"
          fi

          if [[ -f "${ASSET_OUTPUT_DIR}/AppIcon.icns" ]]; then
            cp "${ASSET_OUTPUT_DIR}/AppIcon.icns" "${RESOURCE_DIR}/AppIcon.icns"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jihyunchoi.keyboardclean
        DEVELOPMENT_TEAM: 37A43S5GYQ
        CODE_SIGN_ENTITLEMENTS: Sandbox.entitlements
        INFOPLIST_FILE: Resources/Info.plist
    dependencies: []
schemes:
  KeyboardClean:
    build:
      targets:
        KeyboardClean: all
    run:
      config: Debug
    archive:
      config: Release
